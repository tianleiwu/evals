# onnxruntime-genai local model completion functions.
#
# Usage (run inside the venv that has onnxruntime-genai + evals installed, with
# the CUDA/cuDNN libs on LD_LIBRARY_PATH):
#
#   OPENAI_API_KEY=dummy EVALS_THREADS=1 \
#     oaieval oss/gpt-oss-20b formal-logic
#
oss/gpt-oss-20b:
  class: evals.completion_fns.ort_genai:ORTGenAICompletionFn
  args:
    model_path: /tianlei/models/gptoss20b_int4_qmoe_bs32_ropefix
    execution_provider: cuda
    max_new_tokens: 2048
    extract_letter_choice: true
    do_sample: false
    model_name: gpt-oss-20b

# 10-choice variant for MMLU-Pro (options can run A..J). Same model; only the
# answer-letter extractor is widened and the generation budget raised so the
# reasoning model can finish its chain-of-thought before the final channel.
oss/gpt-oss-20b-mcq10:
  class: evals.completion_fns.ort_genai:ORTGenAICompletionFn
  args:
    model_path: /tianlei/models/gptoss20b_int4_qmoe_bs32_ropefix
    execution_provider: cuda
    max_new_tokens: 4096
    extract_letter_choice: true
    choice_letters: ABCDEFGHIJ
    do_sample: false
    model_name: gpt-oss-20b

# Free-form variant for MATH: no letter extraction (the grader parses the
# \boxed{...} final answer), with a larger budget for long math derivations.
oss/gpt-oss-20b-math:
  class: evals.completion_fns.ort_genai:ORTGenAICompletionFn
  args:
    model_path: /tianlei/models/gptoss20b_int4_qmoe_bs32_ropefix
    execution_provider: cuda
    max_new_tokens: 4096
    extract_letter_choice: false
    do_sample: false
    model_name: gpt-oss-20b

# ---------------------------------------------------------------------------
# Qwen3.6-35B-A3B-NVFP4 (Model Optimizer NVFP4 experts -> ORT QMoE quant_type=nvfp4).
# Point model_path at the Olive-built text model dir (contains genai_config.json).
# ---------------------------------------------------------------------------
qwen/qwen3.6-nvfp4:
  class: evals.completion_fns.ort_genai:ORTGenAICompletionFn
  args:
    model_path: /home/tianlei/models/qwen3.6_nvfp4_onnx
    execution_provider: cuda
    max_new_tokens: 2048
    extract_letter_choice: true
    do_sample: false
    disable_thinking: true
    model_name: qwen3.6-nvfp4

# Thinking-enabled variant for GPQA: chain-of-thought before the final letter.
qwen/qwen3.6-nvfp4-think:
  class: evals.completion_fns.ort_genai:ORTGenAICompletionFn
  args:
    model_path: /home/tianlei/models/qwen3.6_nvfp4_onnx
    execution_provider: cuda
    max_new_tokens: 32768
    extract_letter_choice: true
    do_sample: false
    disable_thinking: false
    model_name: qwen3.6-nvfp4-think

# Thinking-enabled GPQA variant using the Qwen3.6 MTP head. Set
# ORT_MTP_NUM_SPECULATIVE_TOKENS to select the draft count (recommended: 3).
qwen/qwen3.6-nvfp4-mtp-think:
  class: evals.completion_fns.ort_genai:ORTGenAICompletionFn
  args:
    model_path: /home/tianlei/models/qwen3.6_nvfp4_mtp_int8head_hs_onnx
    mtp_model_path: /home/tianlei/models/qwen3.6_nvfp4_mtp_int8head_hs
    execution_provider: follow_config
    max_new_tokens: 32768
    extract_letter_choice: true
    do_sample: false
    disable_thinking: false
    model_name: qwen3.6-nvfp4-mtp-think

# 10-choice variant for MMLU-Pro (options A..J), wider extractor + larger budget.
qwen/qwen3.6-nvfp4-mcq10:
  class: evals.completion_fns.ort_genai:ORTGenAICompletionFn
  args:
    model_path: /home/tianlei/models/qwen3.6_nvfp4_onnx
    execution_provider: cuda
    max_new_tokens: 4096
    extract_letter_choice: true
    choice_letters: ABCDEFGHIJ
    do_sample: false
    model_name: qwen3.6-nvfp4

# MTP N=3 variant for MMLU-Pro. Set ORT_MTP_NUM_SPECULATIVE_TOKENS=3 and
# ORT_MTP_DIRECT_ARENA_COMMIT=1 when evaluating the direct-arena candidate.
qwen/qwen3.6-nvfp4-mtp-mcq10:
  class: evals.completion_fns.ort_genai:ORTGenAICompletionFn
  args:
    model_path: /home/tianlei/models/qwen3.6_nvfp4_mtp_int8head_hscrop_onnx
    mtp_model_path: /home/tianlei/models/qwen3.6_nvfp4_mtp_int8head_hs
    execution_provider: follow_config
    max_new_tokens: 4096
    extract_letter_choice: true
    choice_letters: ABCDEFGHIJ
    do_sample: false
    disable_thinking: true
    model_name: qwen3.6-nvfp4-mtp-n3

# Sampling gate (temp=0.7/top_p=0.8/top_k=20) for speculative-sampling MTP.
# Plain-sampling baseline: the MTP MAIN model run WITHOUT the head (reference
# distribution that MTP speculative sampling must match within 0.5% on MMLU-Pro).
qwen/qwen3.6-nvfp4-mcq10-sample:
  class: evals.completion_fns.ort_genai:ORTGenAICompletionFn
  args:
    model_path: /home/tianlei/models/qwen3.6_nvfp4_mtp_int8head_hs_onnx
    execution_provider: follow_config
    max_new_tokens: 4096
    extract_letter_choice: true
    choice_letters: ABCDEFGHIJ
    do_sample: true
    temperature: 0.7
    top_p: 0.8
    top_k: 20
    disable_thinking: true
    model_name: qwen3.6-nvfp4-sample

# MTP N=3 speculative-SAMPLING variant (draft = sampled q_i, verify = rejection
# sampling against p_i). Uses the standard graph-capable `_hs` main (no crop
# arena; the sampling reject path re-runs decode-consistently). Set
# ORT_MTP_NUM_SPECULATIVE_TOKENS=3 when evaluating.
qwen/qwen3.6-nvfp4-mtp-mcq10-sample:
  class: evals.completion_fns.ort_genai:ORTGenAICompletionFn
  args:
    model_path: /home/tianlei/models/qwen3.6_nvfp4_mtp_int8head_hs_onnx
    mtp_model_path: /home/tianlei/models/qwen3.6_nvfp4_mtp_int8head_hs
    execution_provider: follow_config
    max_new_tokens: 4096
    extract_letter_choice: true
    choice_letters: ABCDEFGHIJ
    do_sample: true
    temperature: 0.7
    top_p: 0.8
    top_k: 20
    disable_thinking: true
    model_name: qwen3.6-nvfp4-mtp-n3-sample

# Free-form variant for MATH (grader parses \boxed{...}), larger budget.
qwen/qwen3.6-nvfp4-math:
  class: evals.completion_fns.ort_genai:ORTGenAICompletionFn
  args:
    model_path: /home/tianlei/models/qwen3.6_nvfp4_onnx
    execution_provider: cuda
    max_new_tokens: 4096
    extract_letter_choice: false
    do_sample: false
    model_name: qwen3.6-nvfp4

# Thinking-enabled free-form variant for AIME 2025 (grader parses \boxed{...}).
qwen/qwen3.6-nvfp4-aime:
  class: evals.completion_fns.ort_genai:ORTGenAICompletionFn
  args:
    model_path: /home/tianlei/models/qwen3.6_nvfp4_onnx
    execution_provider: cuda
    max_new_tokens: 32768
    extract_letter_choice: false
    do_sample: false
    disable_thinking: false
    model_name: qwen3.6-nvfp4-aime

# Instruction-following (IFEval): grade the literal response, so no thinking.
qwen/qwen3.6-nvfp4-ifeval:
  class: evals.completion_fns.ort_genai:ORTGenAICompletionFn
  args:
    model_path: /home/tianlei/models/qwen3.6_nvfp4_onnx
    execution_provider: cuda
    max_new_tokens: 2048
    extract_letter_choice: false
    do_sample: false
    disable_thinking: true
    model_name: qwen3.6-nvfp4-ifeval


