# onnxruntime-genai local model completion functions.
#
# Usage (run inside the venv that has onnxruntime-genai + evals installed, with
# the CUDA/cuDNN libs on LD_LIBRARY_PATH):
#
#   OPENAI_API_KEY=dummy EVALS_THREADS=1 \
#     oaieval oss/gpt-oss-20b formal-logic
#
oss/gpt-oss-20b:
  class: evals.completion_fns.ort_genai:ORTGenAICompletionFn
  args:
    model_path: /tianlei/models/gptoss20b_int4_qmoe_bs32_ropefix
    execution_provider: cuda
    max_new_tokens: 2048
    extract_letter_choice: true
    do_sample: false
    model_name: gpt-oss-20b

# 10-choice variant for MMLU-Pro (options can run A..J). Same model; only the
# answer-letter extractor is widened and the generation budget raised so the
# reasoning model can finish its chain-of-thought before the final channel.
oss/gpt-oss-20b-mcq10:
  class: evals.completion_fns.ort_genai:ORTGenAICompletionFn
  args:
    model_path: /tianlei/models/gptoss20b_int4_qmoe_bs32_ropefix
    execution_provider: cuda
    max_new_tokens: 4096
    extract_letter_choice: true
    choice_letters: ABCDEFGHIJ
    do_sample: false
    model_name: gpt-oss-20b

# Free-form variant for MATH: no letter extraction (the grader parses the
# \boxed{...} final answer), with a larger budget for long math derivations.
oss/gpt-oss-20b-math:
  class: evals.completion_fns.ort_genai:ORTGenAICompletionFn
  args:
    model_path: /tianlei/models/gptoss20b_int4_qmoe_bs32_ropefix
    execution_provider: cuda
    max_new_tokens: 4096
    extract_letter_choice: false
    do_sample: false
    model_name: gpt-oss-20b

# ---------------------------------------------------------------------------
# Qwen3.6-35B-A3B-NVFP4 (Model Optimizer NVFP4 experts -> ORT QMoE quant_type=nvfp4).
# Point model_path at the Olive-built text model dir (contains genai_config.json).
# ---------------------------------------------------------------------------
qwen/qwen3.6-nvfp4:
  class: evals.completion_fns.ort_genai:ORTGenAICompletionFn
  args:
    model_path: /home/tianlei/models/qwen3.6_nvfp4_onnx
    execution_provider: cuda
    max_new_tokens: 2048
    extract_letter_choice: true
    do_sample: false
    disable_thinking: true
    model_name: qwen3.6-nvfp4

# Thinking-enabled variant for GPQA: chain-of-thought before the final letter.
qwen/qwen3.6-nvfp4-think:
  class: evals.completion_fns.ort_genai:ORTGenAICompletionFn
  args:
    model_path: /home/tianlei/models/qwen3.6_nvfp4_onnx
    execution_provider: cuda
    max_new_tokens: 8192
    extract_letter_choice: true
    do_sample: false
    disable_thinking: false
    model_name: qwen3.6-nvfp4-think

# 10-choice variant for MMLU-Pro (options A..J), wider extractor + larger budget.
qwen/qwen3.6-nvfp4-mcq10:
  class: evals.completion_fns.ort_genai:ORTGenAICompletionFn
  args:
    model_path: /home/tianlei/models/qwen3.6_nvfp4_onnx
    execution_provider: cuda
    max_new_tokens: 4096
    extract_letter_choice: true
    choice_letters: ABCDEFGHIJ
    do_sample: false
    model_name: qwen3.6-nvfp4

# Free-form variant for MATH (grader parses \boxed{...}), larger budget.
qwen/qwen3.6-nvfp4-math:
  class: evals.completion_fns.ort_genai:ORTGenAICompletionFn
  args:
    model_path: /home/tianlei/models/qwen3.6_nvfp4_onnx
    execution_provider: cuda
    max_new_tokens: 4096
    extract_letter_choice: false
    do_sample: false
    model_name: qwen3.6-nvfp4
